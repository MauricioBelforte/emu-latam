# ========================================
# EMU LATAM - CONFIGURACIÓN ANTI-LAG
# ========================================

# Run-Ahead: 1 frame oculta latencia de red
run_ahead_enabled = "true"
run_ahead_frames = "1"
run_ahead_secondary_instance = "true"

# Netplay: 1 frame buffer, sin check frames (evita inputs duplicados del guest en host)
# https://github.com/MauricioBelforte/emu-latam/issues/4
netplay_input_latency_frames_min = "1"
netplay_input_latency_frames_range = "0"
netplay_check_frames = "0"

# Frame Delay (reducir visual lag)
video_frame_delay = "0"

# GPU Sync (eliminar frames pre-renderizados)
video_hard_sync = "false"
video_hard_sync_frames = "0"

# Netplay: deshabilitar UPnP/Announce (usamos bore tunnel)
netplay_nat_traversal = "false"
netplay_public_announce = "false"
netplay_use_mitm_server = "false"

# Network: forzar IPv4 para evitar problemas de resolución
network_cmd_enable = "false"

# Input Polling: Normal (0) es compatible con netplay.
# Late (2) causa inputs dobles del guest en el host.
input_poll_type_behavior = "0"
