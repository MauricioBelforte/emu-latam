# ========================================
# EMU LATAM - CONFIGURACIÓN ANTI-LAG (FINAL)
# ========================================
# Versión estable verificada: 2026-07-16
# Todos los flujos (MITM, Bore, Tailscale, Directo) usan este archivo
# via --appendconfig netplay_optimized.cfg

# ========================================
# RUN-AHEAD (PREDICCIÓN DE FRAMES)
# ========================================
# DESACTIVADO: run_ahead_frames=1 con netplay causaba inputs duplicados
# del guest en el host. RetroArch predecía 1 frame adelantado y cuando
# llegaba el input real por red, se aplicaba dos veces (predicho + real).
# Fast-forward (espacio) desactivaba temporalmente el frame limiting y
# el doble toque desaparecía (señal clásica de run-ahead interferiendo).
# Ver: DOCUMENTACION/11-Posibles-Fallas/plan-actual/04-Codigo.md [6]
run_ahead_enabled = "false"

# ========================================
# NETPLAY - BUFFER DE LATENCIA
# ========================================
# mínimo=1, rango=1 → buffer dinámico 1-2 frames. Arranca en 1 frame
# (rápido) pero sube a 2 si hay jitter (evita doble toque).
# Es el punto medio entre velocidad y estabilidad.
# Ver: DOCUMENTACION/12-Test-Latencia-Buffer/plan-actual/04-Codigo.md
netplay_input_latency_frames_min = "1"
netplay_input_latency_frames_range = "1"

# CHECK FRAMES (ROLLBACK)
# Verifica sincronía cada 180 frames (3s a 60fps). Suficientemente
# espaciado para no causar el doble toque, pero detecta desyncs
# mayores (ej: un personaje muerto en una PC y vivo en otra).
# No usar valores <60 (causan doble input por rollback agresivo).
netplay_check_frames = "180"

# ========================================
# FRAME DELAY
# ========================================
# Retrasa la presentación del frame renderizado para mejorar suavidad.
# 0 = sin retraso (mínima latencia de video).
video_frame_delay = "0"

# ========================================
# GPU SYNC
# ========================================
# Desactivado: elimina frames pre-renderizados para reducir latencia.
video_hard_sync = "false"
video_hard_sync_frames = "0"

# ========================================
# NETWORK
# ========================================
# Deshabilitar UPnP, anuncios públicos y servidor MITM integrado.
# Usamos nuestra propia conexión (bore, tailscale, directo).
netplay_nat_traversal = "false"
netplay_public_announce = "false"
netplay_use_mitm_server = "false"

# Forzar IPv4 para evitar problemas de resolución DNS.
network_cmd_enable = "false"

# ========================================
# INPUT POLLING
# ========================================
# Normal (0) es compatible con netplay.
# Late (2) causa inputs dobles del guest en el host (verificado).
input_poll_type_behavior = "0"
